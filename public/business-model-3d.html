<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOSYEL Business Model — 3D Visualization</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #020812; overflow: hidden; font-family: 'Courier New', monospace; }
  #canvas { display: block; }
  #ui {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 10;
  }
  #header {
    position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
    text-align: center; pointer-events: none; z-index: 20;
  }
  #header h1 {
    font-size: 28px; letter-spacing: 8px; text-transform: uppercase;
    color: #00fff7; text-shadow: 0 0 20px #00fff7, 0 0 40px #00fff7;
    font-weight: 300;
  }
  #header p {
    font-size: 11px; letter-spacing: 4px; color: #00fff788;
    margin-top: 6px; text-transform: uppercase;
  }
  #mode-indicator {
    position: fixed; top: 50%; left: 30px; transform: translateY(-50%);
    font-size: 11px; letter-spacing: 2px; color: #00fff755;
    text-transform: uppercase; writing-mode: vertical-rl; transform: rotate(180deg);
  }
  #legend {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 24px; pointer-events: none;
  }
  .leg-item { display: flex; align-items: center; gap: 8px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; }
  .leg-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; }
  #info {
    position: fixed; bottom: 100px; right: 30px; font-size: 10px;
    color: #00fff755; letter-spacing: 1px; text-align: right;
  }
  #drag-hint {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    font-size: 9px; letter-spacing: 2px; color: #ffffff22; text-transform: uppercase;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div id="header">
    <h1>JOSYEL</h1>
    <p>Business Model — Market Positioning</p>
  </div>
  <div id="mode-indicator">PRICING TIERS</div>
  <div id="legend">
    <div class="leg-item">
      <div class="leg-dot" style="background:#ff6b35;box-shadow:0 0 10px #ff6b35"></div>
      <span class="leg-label" style="color:#ff6b35">Competitors</span>
    </div>
    <div class="leg-item">
      <div class="leg-dot" style="background:#00fff7;box-shadow:0 0 10px #00fff7"></div>
      <span class="leg-label" style="color:#00fff7">JOSYEL Startup</span>
    </div>
    <div class="leg-item">
      <div class="leg-dot" style="background:#bf5fff;box-shadow:0 0 10px #bf5fff"></div>
      <span class="leg-label" style="color:#bf5fff">JOSYEL Growth</span>
    </div>
    <div class="leg-item">
      <div class="leg-dot" style="background:#00ff88;box-shadow:0 0 10px #00ff88"></div>
      <span class="leg-label" style="color:#00ff88">JOSYEL Enterprise</span>
    </div>
  </div>
  <div id="info">
    Cost per vehicle/year<br>
    Drag to rotate
  </div>
  <div id="drag-hint">drag to rotate · scroll to zoom</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H, cx, cy;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

// Camera
let rotX = -0.3, rotY = 0.5;
let targetRotX = rotX, targetRotY = rotY;
let drag = false, lastMX, lastMY;
let zoom = 1, targetZoom = 1;

canvas.addEventListener('mousedown', e => { drag = true; lastMX = e.clientX; lastMY = e.clientY; });
canvas.addEventListener('mousemove', e => {
  if (!drag) return;
  const dx = (e.clientX - lastMX) * 0.008;
  const dy = (e.clientY - lastMY) * 0.006;
  targetRotY += dx; targetRotX += dy;
  lastMX = e.clientX; lastMY = e.clientY;
});
canvas.addEventListener('mouseup', () => drag = false);
canvas.addEventListener('mouseleave', () => drag = false);
canvas.addEventListener('wheel', e => {
  targetZoom = Math.max(0.6, Math.min(2, targetZoom - e.deltaY * 0.001));
});

// 3D projection
function project(x, y, z) {
  const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
  let y2 = y * cosX - z * sinX;
  let z2 = y * sinX + z * cosX;
  const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  let x2 = x * cosY + z2 * sinY;
  let z3 = -x * sinY + z2 * cosY;
  const fov = 600 * zoom;
  const d = fov / (fov + z3 + 400);
  return { sx: cx + x2 * d, sy: cy + y2 * d, d, z: z3 };
}

// Pricing tiers (3D bars)
const competitors = [
  { name: 'Samsara', cost: 400, x: -200, color: '#ff6b35' },
  { name: 'Verizon', cost: 350, x: -60, color: '#ff8555' },
  { name: 'Geotab', cost: 200, x: 80, color: '#ff9977' },
];

const josyel = [
  { name: 'Startup', cost: 50, x: 200, color: '#00fff7' },
  { name: 'Growth', cost: 35, x: 300, color: '#bf5fff' },
  { name: 'Enterprise', cost: 25, x: 380, color: '#00ff88' },
];

// Stars background
const stars = Array.from({ length: 150 }, () => ({
  x: (Math.random() - 0.5) * 1200,
  y: (Math.random() - 0.5) * 1200,
  z: (Math.random() - 0.5) * 1200,
  r: Math.random() * 0.8,
}));

// Animated particles
const particles = Array.from({ length: 40 }, () => ({
  x: Math.random() * 400 - 200,
  y: Math.random() * 200,
  z: Math.random() * 200,
  vx: (Math.random() - 0.5) * 0.5,
  vy: (Math.random() - 0.5) * 0.5,
  vz: (Math.random() - 0.5) * 0.5,
  color: ['#00fff7', '#bf5fff', '#00ff88'][Math.floor(Math.random() * 3)],
  life: Math.random() * 100 + 50,
  maxLife: 100,
}));

function drawBar(x, y, z, height, color, label, cost) {
  // Draw 3D bar
  const top = project(x, y + height, z);
  const bottom = project(x, y - 50, z);
  const back = project(x + 30, y + height, z + 20);

  if (bottom.d > 0) {
    const width = 40 * bottom.d;
    const barH = (top.sy - bottom.sy);

    ctx.save();
    ctx.globalAlpha = 0.9;

    // Back face (darker)
    ctx.fillStyle = color + '44';
    ctx.fillRect(back.sx - width/2, back.sy, width, barH);

    // Front face (bright)
    ctx.shadowBlur = 20; ctx.shadowColor = color;
    ctx.fillStyle = color;
    ctx.fillRect(bottom.sx - width/2, bottom.sy, width, barH);

    // Outline
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.strokeRect(bottom.sx - width/2, bottom.sy, width, barH);

    // Top glow
    const grad = ctx.createRadialGradient(
      bottom.sx, bottom.sy, 0,
      bottom.sx, bottom.sy, width * 2
    );
    grad.addColorStop(0, color + '88');
    grad.addColorStop(1, color + '00');
    ctx.fillStyle = grad;
    ctx.fillRect(bottom.sx - width * 1.5, bottom.sy - 20, width * 3, 20);

    // Label
    ctx.font = 'bold 11px Courier New';
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.shadowBlur = 10; ctx.shadowColor = color;
    ctx.fillText(label, bottom.sx, bottom.sy - 70);

    ctx.font = '9px Courier New';
    ctx.fillStyle = color + 'aa';
    ctx.fillText('$' + cost + '/yr', bottom.sx, bottom.sy - 55);

    ctx.restore();
  }
}

let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.008;

  rotX += (targetRotX - rotX) * 0.07;
  rotY += (targetRotY - rotY) * 0.07;
  zoom += (targetZoom - zoom) * 0.07;

  if (!drag) targetRotY += 0.001;

  ctx.clearRect(0, 0, W, H);

  // Background grid
  ctx.save();
  ctx.strokeStyle = '#00fff708';
  ctx.lineWidth = 0.5;
  for (let i = -10; i <= 10; i++) {
    const a = project(i * 50, 0, -600);
    const b = project(i * 50, 0, 600);
    ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();
    const c = project(-600, 0, i * 50);
    const d = project(600, 0, i * 50);
    ctx.beginPath(); ctx.moveTo(c.sx, c.sy); ctx.lineTo(d.sx, d.sy); ctx.stroke();
  }
  ctx.restore();

  // Stars
  stars.forEach(s => {
    const p = project(s.x, s.y, s.z);
    if (p.d > 0) {
      ctx.save();
      ctx.globalAlpha = 0.25 * p.d;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(p.sx, p.sy, s.r * p.d, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
  });

  // Particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.z += p.vz;
    p.life -= 0.5;
    if (p.life <= 0) {
      p.life = p.maxLife;
      p.x = Math.random() * 400 - 200;
      p.y = Math.random() * 200;
      p.z = Math.random() * 200;
    }

    const proj = project(p.x, p.y, p.z);
    if (proj.d > 0) {
      ctx.save();
      ctx.globalAlpha = (p.life / p.maxLife) * 0.6;
      ctx.shadowBlur = 12; ctx.shadowColor = p.color;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(proj.sx, proj.sy, 2.5 * proj.d, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
  });

  // Draw competitor bars
  competitors.forEach(c => {
    drawBar(c.x, -100, -80, c.cost * 1.5, c.color, c.name, c.cost);
  });

  // Draw JOSYEL bars
  josyel.forEach(j => {
    drawBar(j.x, -100, 80, j.cost * 1.5, j.color, j.name, j.cost);
  });

  // Comparison line
  const compAvg = competitors.reduce((a, b) => a + b.cost, 0) / competitors.length;
  const josyAvg = josyel.reduce((a, b) => a + b.cost, 0) / josyel.length;
  const compProj = project(-300, -100 - compAvg * 0.75, -80);
  const josyProj = project(250, -100 - josyAvg * 0.75, 80);

  if (compProj.d > 0 && josyProj.d > 0) {
    ctx.save();
    ctx.strokeStyle = '#00ff8844';
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 4]);
    ctx.beginPath();
    ctx.moveTo(compProj.sx, compProj.sy);
    ctx.lineTo(josyProj.sx, josyProj.sy);
    ctx.stroke();

    // Savings text
    const mid = {
      sx: (compProj.sx + josyProj.sx) / 2,
      sy: (compProj.sy + josyProj.sy) / 2,
    };
    ctx.fillStyle = '#00ff88';
    ctx.font = 'bold 12px Courier New';
    ctx.shadowBlur = 10; ctx.shadowColor = '#00ff88';
    ctx.textAlign = 'center';
    ctx.fillText('75% Savings', mid.sx, mid.sy - 15);

    ctx.restore();
  }

  // ROI indicator (animated)
  const roiScale = 1 + Math.sin(time * 1.5) * 0.1;
  ctx.save();
  ctx.globalAlpha = 0.7 + Math.sin(time) * 0.3;
  ctx.fillStyle = '#00ff88';
  ctx.shadowBlur = 20; ctx.shadowColor = '#00ff88';
  ctx.font = 'bold 16px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('180% ROI Year 1', cx, cy + 200 * roiScale);
  ctx.restore();
}

animate();
</script>
</body>
</html>
